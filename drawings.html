<!DOCTYPE html>
<html>
<head>
    <title>Poster Design</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}
        body{
    margin: 0;
    padding:0 60px;
    padding-top: 90px;
    background: #111;
    color: white;
}

   nav{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:80px;
    padding:0 8%;
    background:rgba(15,15,15,.9);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:1000;
    box-sizing:border-box;
}

.logo{
    font-size:1.5rem;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:30px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-weight:bold;
    transition:.3s;
}

nav ul li a:hover{
    color:#ffc700; 
}


        .gallery{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:20px;
}

        img{
            width:100%;
            border-radius:10px;
            margin-top:30px;
        }

        a{
            color:white;

            
        }
        
        .poster h1{
            font-size:30px;
        }

.poster{
    padding-top:30px;
    padding-left:8%;
    padding-right:8%;
    padding-bottom:50px;
}

.poster h1{
    font-size:30px;
    margin-bottom:10px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(3, 1fr); 
    gap:30px;
}

.gallery img{
    width:100%;
    height:auto;
display:block;  
    border-radius:10px;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.03);
}
        
        .brochures{
            margin-top:50px;

        }
        
    </style>
</head>
<body>

    <nav>
    <h2 class="logo">Drawings</h2>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#portfolio">Portfolio</a></li>
        <li><a href="index.html#contact">Contact</a></li>
    </ul>
</nav>
    
<section class="poster">

    <h1>Traditional</h1>

    <div class="gallery">
        <img src="beomgyu.jpg" >
        <img src="soobin.jpg" >
        <img src="skull.jpg" >
        <img src="eyes.jpg">
        <img src="whale.jpg">
        <img src="david.jpg">
    </div>
</section>





</body>
</html>
